<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智化推 - 视频自动生成</title>
    <!-- Use Bootstrap for quick, clean styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; padding-bottom: 50px; }
        .card { border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #video-container { display: none; margin-top: 30px; }
        video { max-width: 100%; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="text-center mb-4">
                <h2 class="fw-bold">智化推 (Zhi Hua Tui)</h2>
                <p class="text-muted">短视频自动生成 MVP - 产品类模板</p>
            </div>

            <div class="card p-4">
                <form id="videoForm">
                    <!-- Text Inputs -->
                    <div class="mb-3">
                        <label class="form-label">公司名称 / 品牌名</label>
                        <input type="text" class="form-control" name="company_name" required placeholder="例如：山东精细化工有限公司">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">产品名称</label>
                        <input type="text" class="form-control" name="product_name" required placeholder="例如：高纯度聚氨酯">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">应用领域 (用于痛点生成)</label>
                        <input type="text" class="form-control" name="application_area" required placeholder="例如：建筑保温">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">性能卖点</label>
                        <input type="text" class="form-control" name="selling_points" required placeholder="例如：纯度≥99.5%，反应效率提升30%">
                    </div>

                    <hr class="my-4">

                    <!-- Image Uploads -->
                    <div class="mb-3">
                        <label class="form-label">应用领域背景图 (用于痛点开场)</label>
                        <input class="form-control" type="file" name="bg_img" accept="image/*" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">产品特写图 / 效果图</label>
                        <input class="form-control" type="file" name="product_img" accept="image/*" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">公司 LOGO / 门店照片</label>
                        <input class="form-control" type="file" name="logo_img" accept="image/*" required>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary w-100 py-2 fs-5" id="submitBtn">一键生成短视频</button>
                </form>

                <!-- Loading State -->
                <div id="loading" class="text-center mt-4" style="display: none;">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <h5 class="mt-3" id="loadingText">正在合成视频中，请稍候...<br><small class="text-muted fs-6">（大约需要 1-2 分钟）</small></h5>
                </div>
            </div>

            <!-- Video Result Player -->
            <div id="video-container" class="text-center">
                <h4 class="text-success mb-3">✅ 生成成功！</h4>
                <video id="resultVideo" controls width="360"></video>
                <div class="mt-3">
                    <a id="downloadBtn" href="#" class="btn btn-outline-success" download>下载视频</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('videoForm');
    const submitBtn = document.getElementById('submitBtn');
    const loadingDiv = document.getElementById('loading');
    const videoContainer = document.getElementById('video-container');
    const resultVideo = document.getElementById('resultVideo');
    const downloadBtn = document.getElementById('downloadBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault(); // Prevent page refresh

        // Hide form, show loading
        submitBtn.disabled = true;
        loadingDiv.style.display = 'block';
        videoContainer.style.display = 'none';

        // Gather form data (including files)
        const formData = new FormData(form);

        try {
            // 1. Send data to FastAPI to start the background task
            const response = await fetch('/api/generate', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.task_id) {
                // 2. Start polling the status endpoint every 3 seconds
                pollStatus(data.task_id);
            } else {
                alert("提交失败，请重试！");
                resetUI();
            }
        } catch (error) {
            console.error(error);
            alert("网络错误！");
            resetUI();
        }
    });

    function pollStatus(taskId) {
        const intervalId = setInterval(async () => {
            try {
                const res = await fetch(`/api/status/${taskId}`);
                const statusData = await res.json();

                if (statusData.status === 'completed') {
                    // Stop polling
                    clearInterval(intervalId);

                    // Show the video!
                    loadingDiv.style.display = 'none';
                    videoContainer.style.display = 'block';

                    resultVideo.src = statusData.video_url;
                    downloadBtn.href = statusData.video_url;

                    submitBtn.disabled = false;
                    form.reset();
                } else if (statusData.status === 'failed') {
                    clearInterval(intervalId);
                    alert("视频生成失败，请检查服务器日志。");
                    resetUI();
                }
                // If "processing", do nothing and wait for the next tick
            } catch (err) {
                console.error("Polling error:", err);
            }
        }, 3000); // Check every 3 seconds
    }

    function resetUI() {
        submitBtn.disabled = false;
        loadingDiv.style.display = 'none';
    }
</script>

</body>
</html>
